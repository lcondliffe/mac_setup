---
# Mac System Environment Variables (non-secret)
env_vars:
  SKIP: "terraform_checkov,end-of-file-fixer"
  PATH: "/opt/homebrew/bin:/opt/homebrew/sbin:$HOME/bin:$HOME/.local/bin:$HOME/.krew/bin:$PATH"

# Git identity (override with -e git_user_email=...)
git_user_name: "Luke Condliffe"
git_user_email: "aero161.luke@gmail.com"

# home directory structure
directories:
  - "{{ ansible_env.HOME }}/ansible"
  - "{{ ansible_env.HOME }}/ansible/playbooks"
  - "{{ ansible_env.HOME }}/ansible/roles"
  - "{{ ansible_env.HOME }}/repo"
  - "{{ ansible_env.HOME }}/repo/private"
  - "{{ ansible_env.HOME }}/repo/public"
  - "{{ ansible_env.HOME }}/repo/training"
  - "{{ ansible_env.HOME }}/scripts"
  - "{{ ansible_env.HOME }}/temp"

# Homebrew taps
homebrew_taps:
  - azure/functions
  - fluxcd/tap
  - hashicorp/tap
  - homebrew/services
  - infisical/get-cli
  - siderolabs/tap
  - supabase/tap
  - terraform-linters/tap

# Homebrew formulae (CLI tools)
homebrew_formulae:
  - ansible
  - azure-cli
  - azure/functions/azure-functions-core-tools@4
  - bash
  - bat                                   # https://github.com/sharkdp/bat
  - cmake
  - curl
  - eza                                   # https://github.com/eza-community/eza
  - flex
  - fluxcd/tap/flux
  - fzf                                   # https://github.com/junegunn/fzf
  - gemini-cli
  - gh
  - git
  - git-delta                             # https://github.com/dandavison/delta
  - git-filter-repo
  - gitleaks
  - go
  - googleworkspace-cli
  - graphviz
  - hashicorp/tap/terraform
  - helix
  - helm
  - infisical/get-cli/infisical
  - jq
  - json-c
  - kubectl
  - kubectx
  - libpq
  - ncdu                                  # https://github.com/rofl0r/ncdu
  - oci-cli
  - opencode
  - ossp-uuid
  - pipx
  - pkgconf
  - podman
  - podman-compose
  - powershell
  - pre-commit
  - python@3.14
  - siderolabs/tap/talosctl
  - supabase/tap/supabase
  - uv
  - yamllint
  - zsh

# Homebrew casks (GUI apps)
homebrew_casks:
  - chatgpt-atlas
  - claude
  - claude-code
  - cursor
  - docker-desktop
  - drawio
  - flutter
  - gcloud-cli
  - godot
  - google-chrome
  - lens
  - maccy
  - microsoft-remote-desktop
  - notion
  - nvidia-geforce-now
  - obsidian
  - pgadmin4
  - postman
  - powershell
  - scroll-reverser
  - terraform-linters/tap/tflint
  - twingate
  - unnaturalscrollwheels
  - visual-studio-code
  - warp
  - zoom

# pipx packages to install
pipx_packages:
  - black
  - isort
  - jmespath
  - kubediagrams

# vscode extensions to install
vscode_extensions:
  - azurite.azurite
  - eamodio.gitlens                       # GitLens
  - github.copilot-chat
  - github.github-vscode-theme
  - github.vscode-github-actions
  - hashicorp.terraform                   # HashiCorp Terraform
  - matheusq94.tfs                        # Terraform Format on Save
  - ms-azure-devops.azure-pipelines       # Azure Pipelines
  - ms-azuretools.vscode-azurefunctions
  - ms-azuretools.vscode-azureresourcegroups
  - ms-python.debugpy
  - ms-python.python
  - ms-python.vscode-pylance
  - ms-python.vscode-python-envs
  - ms-vscode-remote.remote-ssh
  - ms-vscode-remote.remote-ssh-edit
  - ms-vscode.powershell                  # PowerShell
  - ms-vscode.remote-explorer
  - pkief.material-icon-theme
  - saoudrizwan.claude-dev

# shell aliases
shell_aliases:
  ap: ansible-playbook
  cls: clear
  commit: git add . && git commit -m
  gd: git --no-pager diff
  git-delete-branches: git branch | grep -v "main" | xargs git branch -D
  gl: git log
  gp: git push
  gpl: git pull
  gst: git status
  k: kubectl
  ll: ls -al
  passgen: tr -dc 'A-Za-z0-9' </dev/urandom | head -c 16 ; echo
  pc: pre-commit run --all-files
  tailscale: /Applications/Tailscale.app/Contents/MacOS/Tailscale
  tfmt: terraform fmt -recursive
