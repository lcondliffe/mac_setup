# macOS screenshot keyboard shortcuts (com.apple.symbolichotkeys)
# Swaps the defaults so the simple combos copy to the clipboard, and the
# file-saving behavior moves to the 4-key combos (nothing is lost).
#   parameters = [asciiCode, virtualKeyCode, modifierMask]
#   modifier masks: Cmd=1048576  Shift=131072  Ctrl=262144  Option=524288
#     Cmd+Shift       = 1179648
#     Cmd+Ctrl+Shift  = 1441792
screenshot_hotkeys:
  - id: 28
    name: "Save full screen to file (Cmd+Ctrl+Shift+3)"
    parameters: [51, 20, 1441792]
  - id: 29
    name: "Copy full screen to clipboard (Cmd+Shift+3)"
    parameters: [51, 20, 1179648]
  - id: 30
    name: "Save selected area to file (Cmd+Ctrl+Shift+4)"
    parameters: [52, 21, 1441792]
  - id: 31
    name: "Copy selected area to clipboard (Cmd+Shift+4)"
    parameters: [52, 21, 1179648]

# macOS Dock preferences (com.apple.dock)
# Native, idempotent defaults applied via community.general.osx_defaults.
dock_defaults:
  - key: show-recents
    type: bool
    value: false
    name: "Hide recent/suggested apps in Dock"

# macOS Finder preferences (applied via community.general.osx_defaults)
# domain is per-item because these span NSGlobalDomain, Finder, and desktopservices.
finder_defaults:
  - { domain: NSGlobalDomain, key: AppleShowAllExtensions, type: bool, value: true, name: "Show all file extensions" }
  - { domain: com.apple.finder, key: AppleShowAllFiles, type: bool, value: true, name: "Show hidden files" }
  - { domain: com.apple.finder, key: ShowPathbar, type: bool, value: true, name: "Show path bar" }
  - { domain: com.apple.finder, key: ShowStatusBar, type: bool, value: true, name: "Show status bar" }
  - { domain: com.apple.finder, key: FXPreferredViewStyle, type: string, value: Nlsv, name: "Default to list view" }
  - { domain: com.apple.finder, key: FXDefaultSearchScope, type: string, value: SCcf, name: "Search the current folder by default" }
  - { domain: com.apple.desktopservices, key: DSDontWriteNetworkStores, type: bool, value: true, name: "No .DS_Store on network drives" }

# shell aliases
shell_aliases:
  ap: ansible-playbook
  cls: clear
  commit: git add . && git commit -m
  gd: git --no-pager diff
  git-delete-branches: git branch | grep -v "main" | xargs git branch -D
  gl: git log
  gp: git push
  gpl: git pull
  gst: git status
  k: kubectl
  ll: ls -al
  passgen: tr -dc 'A-Za-z0-9' </dev/urandom | head -c 16 ; echo
  pc: pre-commit run --all-files
  tailscale: /Applications/Tailscale.app/Contents/MacOS/Tailscale
  tfmt: terraform fmt -recursive
